name: CodeQL Security Scan

on:
  push:
    branches: [ main ]

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  analyze:
    runs-on: self-hosted

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: ./.act/codeql-action/init
        with:
          languages: csharp

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore

      - name: Perform CodeQL Analysis
        uses: ./.act/codeql-action/analyze
        with:
          upload: false
          output-dir: results
        env:
          CODEQL_ACTION_NO_TELEMETRY: true
        continue-on-error: true

      - name: Copy results manually
        run: |
          cp -r /tmp/codeql_databases ./results || true

      - name: Debug results
        run: |
          echo "Checking results folder"
          ls -R results || echo "No results found"
