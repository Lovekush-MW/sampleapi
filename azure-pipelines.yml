trigger:
  branches:
    include:
      - main

pool:
  name: Default

variables:
- group: sampleapi-config

stages:

# ---------- BUILD ----------

- stage: Build
  displayName: Build .NET API

  jobs:
  - job: BuildJob

    workspace:
      clean: all

    steps:

    - checkout: self
      clean: true

    - template: templates/build-template.yml
      parameters:
        buildConfiguration: $(buildConfiguration)

# ---------- DEPLOY ----------

- stage: Deploy
  displayName: Deploy to IIS
  dependsOn: Build

  jobs:
  - deployment: DeployWeb
    environment: onprem-dev

    strategy:
      runOnce:
        deploy:
          steps:

          - download: current
            artifact: drop

          - template: templates/deploy-template.yml