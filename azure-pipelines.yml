trigger:
  branches:
    include:
      - main

pool:
  name: Default

variables:
- group: sampleapi-config

stages:

# ---------- BUILD ----------

- stage: Build
  displayName: Build .NET API

  jobs:
  - job: BuildJob

    steps:

    # Disable default checkout
    - checkout: none

    # Manually clone repo using stable HTTP/1.1
    - script: |
        git config --global http.version HTTP/1.1
        git clone https://github.com/Lovekush-MW/sampleapi.git .
      displayName: Clone Repository

    # Run build template
    - template: templates/build-template.yml
      parameters:
        buildConfiguration: $(buildConfiguration)


# ---------- DEPLOY ----------

- stage: Deploy
  displayName: Deploy to IIS
  dependsOn: Build

  jobs:
  - deployment: DeployWeb
    environment: onprem-dev

    strategy:
      runOnce:
        deploy:
          steps:

          # Download build artifact
          - download: current
            artifact: drop

          # Run deploy template
          - template: templates/deploy-template.yml