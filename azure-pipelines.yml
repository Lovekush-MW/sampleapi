trigger:
  branches:
    include:
      - main

# 👇 Use your SELF-HOSTED AGENT
pool:
  name: Default

variables:
  buildConfiguration: 'Release'

stages:

# ---------------- BUILD ----------------

- stage: Build
  displayName: 'Build .NET API'
  jobs:
  - job: Build
    displayName: 'Restore, Build, Publish'
    steps:

    - task: UseDotNet@2
      displayName: 'Use .NET 8 SDK'
      inputs:
        packageType: 'sdk'
        version: '8.0.x'

    - script: dotnet restore
      displayName: 'Restore dependencies'

    - script: dotnet build --configuration $(buildConfiguration)
      displayName: 'Build solution'

    - script: dotnet publish --configuration $(buildConfiguration) --output $(Build.ArtifactStagingDirectory)/publish
      displayName: 'Publish app'

    - publish: $(Build.ArtifactStagingDirectory)/publish
      artifact: drop


# ---------------- DEPLOY ----------------

- stage: Deploy
  displayName: 'Deploy to On-Prem IIS'
  dependsOn: Build

  jobs:
  - job: DeployToIIS
    displayName: 'Copy files to IIS server'

    steps:

    - download: current
      artifact: drop

    - task: CopyFiles@2
      displayName: 'Copy files to IIS wwwroot'
      inputs:
        SourceFolder: '$(Pipeline.Workspace)/drop'
        Contents: '**'
        TargetFolder: 'C:\inetpub\wwwroot'
        OverWrite: true

    - powershell: iisreset
      displayName: 'Restart IIS'