trigger:
  branches:
    include:
      - main

pool:
  name: Default

variables:
- group: sampleapi-config

stages:

# ---------- BUILD ----------

- stage: Build
  displayName: Build .NET API

  jobs:
  - job: BuildJob

    steps:

    # Disable default checkout
    - checkout: none

    # Manually fetch repo safely
    - script: |
        git config --global http.version HTTP/1.1
        git init
        git remote add origin https://github.com/Lovekush-MW/sampleapi.git
        git fetch --depth=1 origin main
        git checkout FETCH_HEAD
      displayName: Fetch repository

    # Run build template
    - template: templates/build-template.yml
      parameters:
        buildConfiguration: $(buildConfiguration)


# ---------- DEPLOY ----------

- stage: Deploy
  displayName: Deploy to IIS
  dependsOn: Build

  jobs:
  - deployment: DeployWeb
    environment: onprem-dev

    strategy:
      runOnce:
        deploy:
          steps:

          - download: current
            artifact: drop

          - template: templates/deploy-template.yml